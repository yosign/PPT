<!DOCTYPE html>

<title>PPT · 如果OpenClaw是AI时代的iPhone 1</title>
<style>* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif; background:#fff; color:#1a1a1a; height:100vh; overflow:hidden; user-select:none; display:flex; flex-direction:column; }
#sa { flex:1; padding:56px 80px 36px; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
.sc { display:flex; flex-direction:column; height:100%; }

/* ── 三种文字样式 ── */
:root { --T: 180px; --B: 90px; }
@media (max-width: 1499px) {
  :root { --T: 120px; --B: 72px; }
}

.st { font-size:var(--T); font-weight:700; color:#1a1a1a; line-height:1.1; letter-spacing:-.02em; }
.sm { font-size:var(--B); color:#444; line-height:1.6; font-weight:400; }
.hl { background:#fff3b0; padding:8px 24px; border-radius:8px; font-weight:600; color:#1a1a1a; font-size:var(--B); display:inline-block; }

/* ── 布局结构类（不涉及字体） ── */
.sh { margin-bottom:36px; flex-shrink:0; }
.sl { font-size:var(--B); font-weight:500; color:#aaa; letter-spacing:.06em; text-transform:uppercase; margin-bottom:16px; }
.sb { flex:1; display:flex; flex-direction:column; justify-content:center; gap:28px; }
.bl { list-style:none; display:flex; flex-direction:column; gap:16px; }
.bl li { font-size:var(--B); color:#1a1a1a; line-height:1.4; display:inline-block; background:#fff3b0; padding:8px 24px; border-radius:8px; font-weight:600; }
.tc { display:grid; grid-template-columns:1fr 1fr; gap:48px; }
.trc { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }
.cb { display:flex; flex-direction:column; gap:16px; }
.ni { display:flex; gap:32px; }
.fl { display:flex; align-items:center; flex-wrap:wrap; gap:16px; }
.gc { background:#fafafa; border:1px solid #efefef; border-radius:14px; padding:36px; }
.gc.on { background:#1a1a1a; border-color:#1a1a1a; }
.gc.on .st { color:#fff; }
.gc.on .sm { color:#aaa; }
hr.dv { border:none; border-top:2px solid #efefef; }
.cvt { font-size:calc(var(--T)*1.2); font-weight:800; color:#1a1a1a; line-height:1.05; letter-spacing:-.03em; }
.cvs { font-size:var(--B); color:#777; line-height:1.8; }
/* 翻页点击区域 */
#click-prev, #click-next { position:fixed; top:0; width:50%; height:100vh; z-index:10; cursor:pointer; }
#click-prev { left:0; }
#click-next { right:0; }

<script>
// 编辑弹窗样式
var _style = document.createElement('style');
_style.textContent = `
#editor-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:center; justify-content:center; }
#editor-overlay.show { display:flex; }
#editor-box { background:#fff; border-radius:12px; padding:32px; width:80vw; max-width:900px; box-shadow:0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:16px; }
#editor-box h3 { font-size:20px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
#editor-box label { font-size:13px; color:#888; font-weight:500; letter-spacing:.04em; text-transform:uppercase; }
#editor-box textarea { width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:14px; font-size:22px; font-family:-apple-system,'PingFang SC',sans-serif; line-height:1.7; resize:vertical; outline:none; color:#1a1a1a; }
#editor-box textarea:focus { border-color:#1a1a1a; }
#editor-box .btns { display:flex; gap:10px; justify-content:flex-end; }
#editor-box button { padding:10px 24px; border-radius:6px; font-size:15px; cursor:pointer; font-family:inherit; border:1px solid #e0e0e0; }
#editor-box .btn-save { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
#editor-box .btn-cancel { background:#fff; color:#666; }
#editor-box .save-status { font-size:13px; color:#60a060; display:none; }
`;
document.head.appendChild(_style);

// 编辑弹窗 HTML
var _el = document.createElement('div');
_el.id = 'editor-overlay';
_el.innerHTML = `
<div id="editor-box">
  <h3 id="ed-title">编辑第 <span id="ed-num">1</span> 页</h3>
  <div>
    <label>PPT 内容（HTML）</label>
    <textarea id="ed-h" rows="8"></textarea>
  </div>
  <div>
    <label>演讲稿</label>
    <textarea id="ed-s" rows="6"></textarea>
  </div>
  <div class="btns">
    <span class="save-status" id="ed-status">✓ 已保存</span>
    <button class="btn-cancel" onclick="closeEditor()">取消</button>
    <button class="btn-save" onclick="saveSlide()">保存</button>
  </div>
</div>`;
document.body.appendChild(_el);

function openEditor() {
  document.getElementById('ed-num').textContent = cur + 1;
  document.getElementById('ed-h').value = D[cur].h;
  document.getElementById('ed-s').value = D[cur].s;
  document.getElementById('ed-status').style.display = 'none';
  document.getElementById('editor-overlay').classList.add('show');
}
function closeEditor() {
  document.getElementById('editor-overlay').classList.remove('show');
  window._editing = false;
}
function saveSlide() {
  D[cur].h = document.getElementById('ed-h').value;
  D[cur].s = document.getElementById('ed-s').value;
  render();
  // 广播给演讲稿窗口
  ch.postMessage({cur: cur, slides: D});
  // 保存到 slides.json（需要 server.js 运行）
  fetch('/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(D)
  }).then(r => r.json()).then(r => {
    var st = document.getElementById('ed-status');
    st.style.display = 'inline';
    st.textContent = r.ok ? '✓ 已保存到 slides.json' : '⚠ 保存失败（需要 node server.js）';
  }).catch(() => {
    var st = document.getElementById('ed-status');
    st.style.display = 'inline';
    st.textContent = '⚠ 需要运行 node server.js 才能持久化保存';
  });
}

// 中键点击打开编辑
document.addEventListener('mousedown', function(e) {
  if (e.button === 1) { e.preventDefault(); openEditor(); }
});
document.addEventListener('auxclick', function(e) {
  if (e.button === 1) { e.preventDefault(); openEditor(); }
});

var D=[{"h": "<div class=\"sb\" style=\"justify-content:flex-end;padding-bottom:32px;gap:28px;\"><div class=\"cvt\">如果OpenClaw是<br>AI时代的iPhone 1</div><div class=\"sm\">两个月真实体验<br>改变了什么，改变不了什么<br>以及这个阶段藏着什么机会</div></div>", "s": "2007年iPhone刚出来，没有应用商店，连文字都选不了、复制不了。知道它的人很少，真正火起来是iPhone 4那时候的事。\n\n但它做了一件事——它重新定义了手机的形态，从一个打电话发短信的设备，变成了个人娱乐和工作的终端。\n\n今天苹果的应用商店，全球一年带动的交易额接近1.3万亿美元，应用商店所在的服务业务占苹果整体收入的26%。这个生态，是从那个连复制粘贴都没有的iPhone 1开始的。\n\n我觉得现在的OpenClaw，有点像那时候的iPhone 1。方向已经定了，生态还没起来，但你能感觉到这个东西不一样。\n\n我用了两个月，今天跟大家说三件事：它改变了什么，改变不了什么，以及现在这个阶段藏着什么机会。"}, {"h": "<div class=\"sb\"><span class=\"hl\">OpenClaw是什么</span><span class=\"hl\">把AI放进你日常用的消息入口</span><div class=\"sm\">飞书 · Telegram · WhatsApp · iMessage</div><span class=\"hl\">接上各种能力</span><div class=\"sm\">你说一句话，它就能把事干了</div></div>", "s": "先说一下这个工具是什么。\n\nOpenClaw做的事情，是把AI放进你每天已经在用的即时通讯软件里——飞书、Telegram、WhatsApp、iMessage，你平时在哪发消息，它就在哪。\n\n然后把你的邮箱、日历、浏览器、文件全部接上。\n\n这样你有事找AI，不用专门打开一个应用，直接去找那个AI聊天，它就把事情干了。"}, {"h": "<div class=\"sb\"><span class=\"hl\">AI工具三代演进</span><span class=\"hl\">第一代  聊天窗口</span><div class=\"sm\">打开网页，一问一答，用完就走</div><span class=\"hl\">第二代  IDE / CLI</span><div class=\"sm\">AI能干活了，但锁在开发工具里</div><span class=\"hl\">第三代  OpenClaw</span><div class=\"sm\">在你的消息软件里，说完它就去做</div></div>", "s": "要说清楚小龙虾改变了什么，得先说AI工具这两年怎么过来的。\n\n第一代是聊天窗口。大家把ChatGPT当百科全书用，打开网页，问问题，把答案复制出来，再关掉。每次用都要重新描述背景，用完跟它没关系。\n\n第二代是IDE和CLI，AI开始能干活了，能写代码、能控制电脑。但这东西基本上锁在开发工具里，普通人感受不到。\n\n第三代是小龙虾。它学习了你的那些技能，你发一条消息，它去做，做完告诉你。不需要打开别的东西。\n\n我第一次体验到这件事的时候，感受不是\"这真厉害\"，而是\"原来AI应该是这个样子的\"。\n\n就像第一次用智能手机的人，不会觉得\"这手机真厉害\"，而是觉得\"手机应该是这个样子的\"。\n\n这个感受我后来跟很多用过OpenClaw的人聊，大家都有。"}, {"h": "<div class=\"sh\"><div class=\"sl\">第一代的问题</div><div class=\"st\">摩擦太大</div></div>\n<div class=\"sb\"><span class=\"hl\">需要的时候打开一个软件</span><div class=\"sm\">问完问题，复制出来，关掉</div><div class=\"sm\">外挂的形式，两边始终没连上</div></div>", "s": "第一代有一个根本问题，不是模型不够聪明，是摩擦太大。\n\n你需要的时候，专门打开一个软件，重新描述背景，等回答，把有用的复制出来，再回到工作状态。\n\n它是外挂的形式——你的工作流在这边，AI在另一个App里，用完关掉，两边始终没连上。"}, {"h": "<div class=\"sb\"><span class=\"hl\">工具进化的本质</span><div class=\"sm\">三个工具，玩不出花样</div><div class=\"sm\">三千个工具，开始有创造力</div><span class=\"hl\">智能体的进化</span><span class=\"hl\">不亚于大模型的进化</span></div>", "s": "周鸿祎说了一句话我印象很深：\n\n\"当你给智能体三个工具，它玩不出花样；当你给它三千个工具，它就开始有创造力了。\"\n\n这句话点出了小龙虾为什么不一样。第一代、第二代AI工具，本质上是给AI规定好了能干什么。小龙虾是反过来的——给它一个目标，让它自己去找工具、组合工具、甚至自己写工具。\n\n他还说：智能体的进化本身，并不亚于大模型的进化。\n\n过去两年大家一直盯着参数多少、算力多少。但龙虾告诉我们，工具的扩展和协作能力，同样是一条进化路径。不是只有更大的模型才代表进步。"}, {"h": "<div class=\"sh\"><div class=\"sl\">第二代的问题</div><div class=\"st\">AI能干活了</div></div>\n<div class=\"sb\"><span class=\"hl\">但你得坐在电脑前</span><span class=\"hl\">得有编程经验</span><span class=\"hl\">才能让它为你所用</span></div>", "s": "第二代往前走了一步，AI能干活了，能写代码、能控制电脑。\n\n但本质上还是一样——你得坐在电脑前，打开专门的软件，而且得有一些编程经验，才能真正让AI帮你做事。\n\n对大多数人来说，这道门还是没开。"}, {"h": "<div class=\"sb\"><div class=\"sl\">Heartbeat：AI的心跳</div><div class=\"sm\">定时唤醒 → 执行任务 → 休眠 → 再唤醒</div><span class=\"hl\">不再等你问</span><span class=\"hl\">它自己按时工作</span><span class=\"hl\">从\"AI等人\"到\"AI主动干活\"</span></div>", "s": "第三代最关键的突破，不只是接上了消息软件，而是一个叫Heartbeat的机制。\n\n心跳这个词很形象。人的心脏每隔一段时间跳动一次，维持身体运转。AI的Heartbeat每隔一段时间触发一次，维持任务运行。\n\n具体怎么工作？四步：定时器触发，AI被唤醒，执行预设好的流程，做完休眠，等下次触发。\n\n前两代AI，你不问它不动。你睡了它也睡了。\n\nHeartbeat改变了这件事。你设置好\"每天早上9点帮我整理昨天数据\"，然后去睡觉——第二天早上，报告已经在你消息软件里等你了。\n\n我自己的Agent，每天定时做五件事：抓取当天AI资讯、检查我的日历、看前一天内容数据、推荐今天要看的文章、提醒待处理的事项。\n\n这些加起来我以前每天要花45分钟。现在是0分钟——我起床的时候全都做好了。\n\n这就是从\"AI等人\"到\"AI主动干活\"的转变。这一步，才是真正把AI变成助手的关键。"}, {"h": "<div class=\"sh\"><div class=\"sl\">门槛降低了</div><div class=\"st\">把复杂工具包装成一个机器人</div></div>\n<div class=\"sb\"><span class=\"hl\">你只需要跟它对话</span><span class=\"hl\">不需要学软件</span><span class=\"hl\">不需要懂编程</span><span class=\"hl\">就像有了自己的贾维斯</span></div>", "s": "相比前两代，OpenClaw在使用门槛上降低了很多。\n\n它可以把一个很复杂的工具，完全包装成一个机器人。你不需要学怎么用那个工具，不需要懂编程，就是跟一个机器人对话，把你要做的事说清楚，它去搞定。\n\n当然要说清楚——部署门槛还是挺高的，装起来需要折腾一番。但装好之后，使用门槛是真的低，普通人也能用起来。\n\n这就是所谓的贾维斯——钢铁侠不需要自己动手操作每一个系统，他只是说话，贾维斯去执行。OpenClaw想做的就是这件事。"}, {"h": "<div class=\"sh\"><div class=\"sl\">我的两个账号</div><div class=\"st\">账号 A    AI资讯 · 图文内容</div></div>\n<div class=\"sb\"><span class=\"hl\">账号 B    疗愈音频 · 脑波音乐</span><div class=\"sm\">创作需要时间，每天要花很多时间在创作上</div><span class=\"hl\">但实际上不需要花那么多</span><span class=\"hl\">碎片时间完全可以用上</span></div>", "s": "接下来说说我自己的真实体验。\n\n我在运营两个内容账号，一个做AI资讯和独立开发，一个做疗愈音频，冥想和脑波音乐。\n\n两个方向完全不同，但有一个共同问题：创作需要时间，而我们每天要花很多时间在创作上。\n\n但实际上不需要花那么多时间，碎片时间完全可以用上。于是我用小龙虾把这两个账号的工作方式都重构了。"}, {"h": "<div class=\"sh\"><div class=\"sl\">图文创作</div><div class=\"st\">以前</div></div>\n<div class=\"sb\"><span class=\"hl\">有想法 → 等整块时间 → 写</span><div class=\"sm\">想法容易过时，今天有明天不写就浪费了</div><span class=\"hl\">现在</span><span class=\"hl\">读完文章 = 文章写完了</span><span class=\"hl\">阅读就是写作最核心的环节</span></div>", "s": "先说图文账号。\n\n以前写文章需要整块时间，但更大的问题不是时间不够，是想法容易过时。今天有个想法，第二天没空写，第三天不写，这个想法就浪费了。\n\n现在的流程彻底变了：我读完一篇文章，文章基本上就写完了。\n\n具体来说，小龙虾推荐内容，我选择读哪篇，分段读完之后写读书笔记。阅读的时候产生的想法最有价值，这一步是整个流程最核心的环节。AI根据笔记帮我选选题、完善结构，最后结合笔记和原文直接输出文章。\n\n几乎把整个写作流程重新梳理了一遍，节省的不只是时间，是那些本来会浪费掉的想法。"}, {"h": "<div class=\"sh\"><div class=\"sl\">疗愈音频</div><div class=\"st\">以前</div></div>\n<div class=\"sb\"><span class=\"hl\">凭感觉选内容</span><span class=\"hl\">我喜欢的 ≠ 受众需要的</span><span class=\"hl\">现在</span><span class=\"hl\">AI筛高播放量音频 → 裁剪</span><span class=\"hl\">→ 配视频 → 加说明 → 我拍板</span></div>", "s": "再说疗愈音频账号。\n\n以前选内容靠感觉，选自己喜欢的颜色、视频、音频。但有一个隐蔽的问题：我的喜好不等于受众的需求。我觉得好看，不代表看冥想内容的人需要这个。\n\n现在是AI去找高播放量的脑波音频，按质量筛选，裁剪成30分钟，配上疗愈视频，加文字说明，组成几个方案给我选。\n\nAI的筛选逻辑是完全客观的，高播放量是受众用行为投票出来的答案，不掺杂我的主观偏好。我从\"凭感觉做内容\"变成了\"在客观筛选的基础上做最终判断\"。"}, {"h": "<div class=\"sb\"><span class=\"hl\">两个Agent分工干活</span><div class=\"sm\">墨隼（主Agent）  调度中心，规划协调</div><div class=\"sm\">墨写（写作Agent）  执行专家，创作发布</div><span class=\"hl\">发一条消息 → 两个Agent分工完成</span><span class=\"hl\">这就是multi-agent的现实形态</span></div>", "s": "运营这两个账号之后，我发现一个Agent不够用了。\n\n做内容这件事，分两层：一层是策略，要不要写、写什么、发给谁看——这需要判断。另一层是执行，查资料、写初稿、配图、发布——这是重复劳动。\n\n把这两层分给两个Agent，效率直接翻。\n\n墨隼是主Agent，相当于调度中心。我发一条消息过去，它判断要做什么，然后分派任务。\n\n墨写是写作Agent，相当于执行专家。专门负责内容创作和发布，有自己的技能集和发布权限。\n\n举个真实场景：我发一条\"今天这篇OpenClaw套壳的文章值得写\"，墨隼收到，判断这是写作任务，把选题和背景传给墨写，墨写去查资料、拉数据、写初稿，写完汇报结果，墨隼整合后告诉我\"初稿在哪，需要你确认\"。\n\n整个过程我只说了一句话。\n\n你们可能注意到了——我刚才说的这个演讲，今天早上的内容整理，就是这样跑出来的。我现在站在这里，后面有个写作Agent在工作。这不是演示，这就是今天的日常。\n\n这就是multi-agent的现实形态。不是科幻片里那种，是今天就能跑起来的那种。"}, {"h": "<div class=\"sh\"><div class=\"sl\">图文工作流</div><div class=\"st\">找选题        Twitter · 论文 · 最新发布</div></div>\n<div class=\"sb\"><span class=\"hl\">↓</span><span class=\"hl\">推荐内容      我选几篇阅读</span><span class=\"hl\">↓</span><span class=\"hl\">写读书笔记    AI整合成原文+笔记</span><span class=\"hl\">↓</span><div class=\"sm\">逐段写文章    3000字，面向我的读者</div><span class=\"hl\">↓</span><span class=\"hl\">转图片 → 自动发布</span></div>", "s": "我把整个工作流告诉了小龙虾。\n\n它每天去Twitter、论文库、最新发布里找选题，推给我一批内容，我从里面选几篇读。读完写笔记，发给它，它把原文和笔记整合在一起，然后逐章逐段帮我写文章，大概3000字。\n\n写文章的时候，它知道我的账号定位是什么，面向的读者是谁，什么样的写法数据会好。这个不是固定的，是会迭代的。\n\n写完之后，文字转图片，通过浏览器模拟点击，自动传到平台，贴上标题，点发布。全程我不需要动手。"}, {"h": "<div class=\"sh\"><div class=\"sl\">数据迭代</div><div class=\"st\">每天9点看前一天数据</div></div>\n<div class=\"sb\"><div class=\"sm\">点击率 · 点赞率 · 收藏率 · 分享率</div><span class=\"hl\">↓</span><span class=\"hl\">提炼写作方法</span><span class=\"hl\">↓</span><span class=\"hl\">更新prompt里的写作建议</span><span class=\"hl\">↓</span><span class=\"hl\">下一篇文章自动变好</span></div>", "s": "每天早上9点，它去看前一天的数据——点击率、点赞率、收藏率、分享率。\n\n根据这些数据，它对自己写的文章做总结，提炼出哪些写法对我的读者有效，然后把这些方法更新到它的写作建议里。\n\n下一篇文章，它就用更新后的方法写。\n\n这样整个流程就形成了一个自动迭代的闭环，不需要我手动去复盘。"}, {"h": "<div class=\"sh\"><div class=\"sl\">记忆系统</div><div class=\"st\">目前吐槽最多的部分</div></div>\n<div class=\"sb\"><span class=\"hl\">昨天说的事今天忘了</span><span class=\"hl\">一直强调的事记不住</span><span class=\"hl\">短期长期记忆混乱</span></div>", "s": "说一个大家用小龙虾吐槽最多的问题——记忆系统。\n\n它目前不够智能。昨天跟它说的事，今天可能就忘了。一直强调的事，它记不住。短期和长期记忆有点混乱。\n\n这不是小毛病，是真实影响体验的问题。"}, {"h": "<div class=\"sb\"><div class=\"sl\">解决方案：QMD</div><div class=\"sm\">短期记忆   最近发生的事，清晰</div><div class=\"sm\">长期记忆   定期压缩归纳，越来越大</div><div class=\"sm\">QMD        按需提取，不用全塞进上下文</div><span class=\"hl\">效率更高 · 更省钱 · 记忆力更好</span></div>", "s": "我本来想接一个付费的记忆方案，后来发现有个开源的叫QMD，解决了同样的问题，就接上了。\n\n在折腾这个过程里，我大概搞清楚了AI的记忆是怎么工作的。其实跟人很像——短期记忆是一个文件，记着最近发生的事，很清楚。长期记忆会定期把近期内容压缩归纳，写进一个越来越大的长期记忆文件。\n\n问题是，如果把所有记忆都塞进模型的上下文，又慢又贵。QMD的做法是按需提取——需要什么记忆，临时去找，不用全部加载。\n\n这样就形成了一个既高效又省钱、记忆力还不错的系统。\n\n我觉得这是现在这个阶段折腾小龙虾最大的收获之一——你会真正搞清楚AI是怎么工作的。"}, {"h": "<div class=\"sb\"><span class=\"hl\">养虾的真正门槛</span><span class=\"hl\">模型质量决定体验上限</span><span class=\"hl\">国产模型体验落后半年</span><div class=\"sm\">认真用，模型不要省</div></div>", "s": "用了两个月，想直接说清楚这个工具的边界。\n\n第一个门槛是模型。模型质量对养虾体验的影响比你想象的大，模型弱一档，整个体验就掉一个台阶。国产模型体验大概落后半年。如果打算认真用，模型不要省。"}, {"h": "<div class=\"sh\"><div class=\"sl\">不是在用软件</div><div class=\"st\">是在培养实习生</div></div>\n<div class=\"sb\"><span class=\"hl\">实习生会犯错</span><span class=\"hl\">你得给他交学费</span><span class=\"hl\">越用越了解你</span><span class=\"hl\">最后变成你的第二大脑</span></div>", "s": "在说门槛之前，我想先调整一个心态。\n\n周鸿祎说了一句我觉得比任何操作手册都有用的话：\n\n\"不要把龙虾看成一个软件。我一直提醒自己：我不是买了一个软件，我是培养了一个实习生。实习生当然会犯错，你得给他交学费。\"\n\n这个比喻非常准。\n\n用软件是消费者心态——这功能为什么不好用，这bug为什么没修。\n培养实习生是投入心态——我得把任务描述清楚，得给他反馈，这次没做好不代表下次不行。\n\n软件不会越用越懂你。实习生会。做了100件事之后，知道你的风格、你的偏好、你的底线。\n\n他说：\"龙虾越用越了解你，最后会变成你的第二大脑。\"\n\n养龙虾的过程，不只是在配置工具，是在积累一个越来越懂你的搭档。交学费是值得的。"}, {"h": "<div class=\"sb\"><span class=\"hl\">一个朋友的故事</span><span class=\"hl\">折腾一礼拜装好了</span><span class=\"hl\">继续当GPT用</span><span class=\"hl\">没ChatGPT好用</span><span class=\"hl\">放弃了</span><div class=\"sm\">问题不是工具，是没想清楚要用它做什么</div></div>", "s": "我一个朋友的经历更能说明问题。\n\n他从安装到配置折腾了一礼拜，装好了之后，继续当GPT用，发现没有ChatGPT好用，就放弃了。\n\n他的问题不是小龙虾不好，是他从来没想清楚，装好之后要用它做什么具体的事。"}, {"h": "<div class=\"sh\"><div class=\"sl\">真正的门槛</div><div class=\"st\">你有没有</div></div>\n<div class=\"sb\"><span class=\"hl\">真实的、可替代的、重复性的任务</span><div class=\"sm\">有，它能帮你</div><div class=\"sm\">没有，装了也是摆设</div></div>", "s": "这才是我觉得最核心的门槛。\n\n你有没有真实的、可替代的、重复性的任务。\n\n很多人说小龙虾能帮你赚钱，这话没错，但得说清楚。它不是你说\"帮我赚钱\"它就能做到，这种模糊的任务它做不了。\n\n那些用它赚到钱的人，是因为他们有一套相对固定的工作流，比如量化交易，比如内容发布，把这套流程交给小龙虾去执行，它能完整跑完。\n\n所以真正的问题不是小龙虾能不能帮你赚钱，而是你有没有一套具体的、可以描述清楚的流程，可以交给它去跑。有，它能帮你。没有，装了也是摆设。"}, {"h": "<div class=\"sb\"><span class=\"hl\">这个阶段藏着什么机会</span><span class=\"hl\">生态位几乎都是空的</span><span class=\"hl\">iPhone 1发布时</span><div class=\"sm\">没人知道Uber和Instagram会出现</div><span class=\"hl\">那些公司都在那个时间窗口找到了位置</span></div>", "s": "最后说说机会。\n\n现在是同样的时刻。\n\niPhone 1发布的时候，没人知道Uber会出现，没人知道Instagram会出现。但那些公司都在那个时间窗口里找到了自己的位置。\n\n现在OpenClaw的生态位几乎都是空的，我看到五类机会。"}, {"h": "<div class=\"sb\"><span class=\"hl\">机会一  入口层</span><span class=\"hl\">谁占住用户最高频的消息入口</span><span class=\"hl\">谁就是AI时代的主屏</span><div class=\"sl\">过去：手机桌面、App图标</div><div class=\"sl\">接下来：聊天线程、语音唤起、通知流</div></div>", "s": "第一类机会是入口层。\n\n过去十年，占住用户手机主屏的App赢了。接下来，谁先占住用户最高频的消息入口，谁就更有可能成为AI时代的主屏。\n\n这个方向的机会不只是做一个agent，而是做AI的操作系统外壳——会话中控台、跨渠道身份层、记忆层、权限层。"}, {"h": "<div class=\"sb\"><span class=\"hl\">大厂都来套壳了</span><span class=\"hl\">小米  Miclaw</span><span class=\"hl\">腾讯  QClaw</span><div class=\"sm\">套壳不是做不到，是买时间押生态</div><div class=\"sm\">方向已经成立，不是小众玩具</div></div>", "s": "有一个信号值得说一下：大厂开始做OpenClaw套壳了。\n\n小米出了Miclaw，腾讯出了QClaw，还有网易也有类似的东西。都是封装好的OpenClaw，加上自己的生态。\n\n有人可能觉得，大公司有那么多资源，自己做不就行了？\n\n这个判断忽略了一件事：做底层和做应用是两回事。OpenClaw这套\"AI连接现实世界\"的底层架构，从零搭起来没有两三年搭不出来。大厂选择套壳，是买时间——用三个月做完别人三年才能做出来的底层，然后把所有精力全押在自己的生态上。\n\n小米Miclaw之所以有意思，是因为它背后有一屋子小米设备。你跟Miclaw说\"帮我把客厅灯光调成看电影的模式，开Netflix找上次没看完那部\"——这件事，在没有AI调度层的情况下要分开操作好几步，有了Miclaw可能就是一句话。\n\n这说明什么？大厂也认为这个方向成立。\n\n当小米、腾讯都在押注OpenClaw生态的时候，这已经不是某些极客在玩的小众玩具了。"}, {"h": "<div class=\"sb\"><span class=\"hl\">机会二  技能生态</span><span class=\"hl\">iPhone真正爆发靠的是应用商店</span><div class=\"sm\">不是硬件，是生态</div><span class=\"hl\">可发现、可安装、可收费的skills</span><span class=\"hl\">谁先做出高质量技能</span><span class=\"hl\">谁吃到最早一波生态红利</span></div>", "s": "第二类机会是技能生态。\n\niPhone真正爆发靠的不是硬件，是应用商店。小龙虾的长期价值也未必来自一个主agent，而可能来自可发现、可安装、可收费的skills生态。\n\n这也是为什么腾讯背着骂名也要把小程序商店搞起来的原因——这是一个很重要的生态位，谁占住谁就有持续的收益。\n\n不过我自己觉得，skill商店的生态最终长什么样，现在还不好说。这个方向是对的，但具体形态可能跟我们现在想的不一样，后续观察。"}, {"h": "<div class=\"sb\"><span class=\"hl\">机会三  垂直场景产品化</span><span class=\"hl\">用户不为「agent架构」买单</span><span class=\"hl\">只为「帮我省30分钟」买单</span><span class=\"hl\">找到那个具体的烦恼</span><span class=\"hl\">把它做透</span><span class=\"hl\">就是一个产品</span></div>", "s": "第三类机会是垂直场景产品化。\n\n早期智能手机时代的赢家，往往不是先讲平台故事的人，而是先把一个场景做透的人。\n\n用户不会为\"agent架构\"买单，只会为\"帮我省下30分钟\"买单。找到那个具体的烦恼，把它做透，就是一个产品。对在座的创业者来说，这是最直接的切入点。"}, {"h": "<div class=\"sb\"><span class=\"hl\">入口层怎么切进去</span><span class=\"hl\">从你每天最高频打开的那个软件开始</span><div class=\"sm\">微信 / 飞书 / Telegram / 企业微信</div><span class=\"hl\">让AI在那里等你</span><span class=\"hl\">第一周只做一件事</span><span class=\"hl\">形成肌肉记忆</span></div>", "s": "说到入口层机会，创业者具体怎么做？我说说自己的实操经验。\n\n第一步，从你每天最高频打开的消息软件开始。不要为了用OpenClaw而换一个不习惯的平台，你现在最常用哪个就接哪个。我自己是飞书和Telegram，所以这两个先接上。\n\n第二步，第一周只做一件事。不要一上来就把所有功能都配满，先找你每天最烦的那一个重复动作，只让AI做这一件事。\n\n我第一周只让AI帮我整理每天的信息流——把各渠道的消息汇总成一个简报。就这一件事，但这件事让我每天早上查手机的时间从二十分钟压缩到五分钟。一周下来，我会想着\"早上先问一下AI\"，习惯开始形成了。\n\n第三步，形成肌肉记忆之后再扩展。当你发现自己自然而然地去问AI、去给AI分配任务，这时候再加第二件事、第三件事。\n\n切入口的核心逻辑是：不是功能多就好，是你会不会用。习惯一旦形成，就很难离开。\n\n对做产品的人来说，这个逻辑同样适用——帮用户在他们已有的入口里形成一个小习惯，比拉他们去一个全新平台容易得多。"}, {"h": "<div class=\"sb\"><span class=\"hl\">机会四  安全基础设施</span><span class=\"hl\">AI Agent时代的360安全助手</span><span class=\"hl\">最容易被低估</span><span class=\"hl\">护城河最深</span></div>", "s": "第四类机会是安全基础设施。\n\n这是AI Agent时代的360安全助手。现在腾讯手机管家已经在做这个事了，它已经可以扫你电脑上装小龙虾时的安全问题。\n\n最容易被低估，但护城河最深。"}, {"h": "<div class=\"sb\"><span class=\"hl\">机会五  个性化记忆飞轮</span><span class=\"hl\">越了解你</span><span class=\"hl\">替代成本越高</span><span class=\"hl\">用户不会轻易离开</span><span class=\"hl\">一个越来越懂自己的助手</span></div>", "s": "第五类机会是个性化记忆飞轮。\n\n现在已经有很多外挂的记忆系统，开源的、闭源的、收费的、免费的都有了。如何管理你和AI交互的这套上下文，会成为未来一个很重要的壁垒。\n\n因为这个记忆系统里存的，是你的偏好、你的决策习惯、你的工作方式。用久了，AI比你自己更懂你自己。\n\n到那个时候，你不会轻易换掉它。这套记忆就是护城河。"}, {"h": "<div class=\"sb\"><div class=\"sl\">垂直场景：三个具体例子</div><span class=\"hl\">个人行政助理  日程+邮件+提醒全自动</span><div class=\"sm\">销售跟进      客户信息+跟进提醒+话术生成</div><span class=\"hl\">创作者工作台  选题+写作+发布一条龙</span></div>", "s": "说到垂直场景产品化，我举三个具体的例子，都是现在就能跑的方向。\n\n第一个，个人行政助理。\n\nAI接上日历、邮件、消息通知，每天早上给你发一条摘要：今天几个会、几封待回复邮件、有没有要处理的紧急事项。晚上帮你整理今天没完成的任务，推迟或者提醒。出差前帮你把行程、酒店、接送安排整合成一张清单发给你。\n\n这件事有人在做，做成产品卖给高管和创业者，月付99美元。用户的核心需求就是：不想盯着各种App，想被一个\"秘书\"汇总告知。\n\n第二个，销售跟进。\n\n销售最大的问题是跟进不及时、信息散落在各个地方。AI接上CRM、邮件、通话记录，每天整理每个客户的最新状态，提醒\"这个客户三天没联系了\"，根据客户行业和背景自动生成跟进话术，发给销售确认后直接发出去。\n\nBotpress有一个叫Gordon的bot，专门监控HubSpot，处理demo预约，每周帮销售团队省好几个小时。这就是把一个具体的销售痛点做成一个产品的思路。\n\n第三个，创作者工作台。\n\nAI接上内容平台的数据接口，监控选题热度，推荐选题，帮写初稿，按平台规格做排版，定时发布。我自己用的就是这个模式，我的整个图文工作流就跑在小龙虾上。\n\n这三个场景有一个共同点：用户不需要知道AI怎么工作，他只需要感受到\"以前要花半小时的事，现在五分钟搞定了\"。这就是产品价值。"}, {"h": "<div class=\"sb\"><span class=\"hl\">OPC 一人公司</span><span class=\"hl\">不是你一个人有多厉害</span><span class=\"hl\">是你会不会管一群龙虾</span><div class=\"sl\">过去：一人公司 = 一个人扛所有</div><div class=\"sl\">现在：一人公司 = 一个人指挥一支Agent队伍</div></div>", "s": "说到机会，有一个词最近很流行——OPC，One Person Company，一人公司。\n\n但我觉得现在说的OPC，跟以前说的那种\"一人公司\"完全不是一回事。\n\n以前说一人公司，潜台词是这个人什么都会——会写代码、会做设计、会谈客户、会发运营。是一个\"全能型选手\"独自撑起一家公司。\n\n现在说的OPC，核心不是你有多厉害，是你会不会管一群龙虾。\n\n你不需要自己写每一行代码，你需要能把需求描述清楚，让Agent去写。你不需要自己做每张图，你需要知道要什么风格，让Agent去生成。你不需要自己盯着每一条数据，你需要告诉Agent盯什么、盯到什么程度、出了情况怎么通知你。\n\n这是一种新的能力——管理Agent的能力。懂得多，不是说你每样都精通，而是你对各个领域都有足够的判断力，能知道Agent做得对不对，能发现问题在哪。\n\n以前的管理学说，好的管理者不需要比下属更专业，但需要能识别好工作和坏工作的区别。\n\n现在这句话同样适用于管理Agent。\n\n这就是为什么我说，这个时代最值钱的能力不是某一项技能，而是系统性的判断力和调度能力。一个人，加一群龙虾，可以干以前需要一支团队才能干的事。"}, {"h": "<div class=\"sb\"><span class=\"hl\">未来的生意可能是面向龙虾的</span><div class=\"sl\">以前：面向人做产品</div><div class=\"sl\">以后：面向Agent做服务</div><span class=\"hl\">龙虾会接管</span><span class=\"hl\">比价、筛选、下单、预约、退货</span><div class=\"sl\">人只做最后一步：要不要</div></div>", "s": "最后说一个我越想越觉得重要的判断。\n\n以后的生意，可能不是面向人的，而是面向龙虾的。\n\n为什么这么说？想想手机带来了什么变化。手机出来之前，你要买东西，得去商场。手机出来之后，商家的生意变成了面向手机做的——App、小程序、外卖平台，都是面向手机这个入口做的。\n\n龙虾正在走同样的路。\n\n它会逐步接管人类日常中那些细碎的工作，包括消费决策。比价、筛选、下单、预约、退货——这些事情，你现在自己做，以后龙虾帮你做。\n\n你可能早上跟它说\"帮我看看那个航班有没有降价\"，它盯着，降了就买。你说\"下周出差，帮我订一个安静、离会场近的酒店\"，它去比、去筛、给你三个方案，你选一个，它下单。\n\n当越来越多人的消费决策由Agent代理的时候，商家的营销对象就不再是人，而是Agent。\n\n你的产品页面不需要好看，不需要煽情文案，需要的是结构化的数据——让Agent能读懂、能比较、能做判断。\n\n这就像移动互联网时代，不做移动端的商家被淘汰了。Agent时代，不做Agent友好的商家，可能也会被淘汰。\n\n这件事现在还很早，但方向已经能看到了。对在座的创业者来说，这是一个值得提前布局的维度。"}, {"h": "<div class=\"sh\"><div class=\"sl\">找到那个烦恼</div><div class=\"st\">比研究工具更重要</div></div>\n<div class=\"sb\"><span class=\"hl\">现在是2007年</span><span class=\"hl\">位置还没人占</span></div>", "s": "小龙虾不是一个让你突然变得更厉害的工具。\n\n它更像一面镜子——你在配置它的时候，实际上是在梳理自己的工作方式。哪些值得自动化，哪些必须亲手做，哪些信息是真正有价值的。\n\n如果你是普通人，错过小龙虾，可能真的没什么影响。但如果你是从业者，错过iPhone 1，你可能会错过一年后的应用商店，错过整个时代最重要的占位机会。\n\n找到那个烦恼，比研究工具本身更重要。\n\n谢谢大家。"}];


















var cur=0, tot=D.length;
var ch = new BroadcastChannel('ppt-sync');

function render(broadcast){
  sessionStorage.setItem('ppt_cur', cur);
  document.getElementById('sc').innerHTML='<div class="sc">'+D[cur].h+'</div>';
  document.getElementById('pg').textContent=(cur+1)+' / '+tot;
  document.getElementById('pb').style.width=((cur+1)/tot*100)+'%';
  if(broadcast !== false) ch.postMessage({cur: cur});
}

function nav(d){
  var n=cur+d;
  if(n>=0&&n<tot){ cur=n; render(); }
}

ch.onmessage = function(e){
  if(typeof e.data.cur === 'number' && e.data.cur !== cur){
    cur = e.data.cur;
    if(e.data.slides) D = e.data.slides;
    render(false);
  }
};

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nav(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') nav(-1);
  if(e.key==='e'||e.key==='E') openEditor();
  if(e.key==='Escape') closeEditor();
});

render();
</script>

<script>
// ── 热更新 ────────────────────────────────────────────────────────────────
(function() {
  var lastHash = '';
  setInterval(function() {
    fetch('/slides.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var hash = text.length + '_' + text.slice(-32);
        if (lastHash && hash !== lastHash) {
          try {
            if (!window._editing) {
              var newData = JSON.parse(text);
              D.length = 0;
              newData.forEach(function(s) { D.push(s); });
              render(false);
              console.log('[热更新] 第' + (cur+1) + '页已更新');
            }
          } catch(e) {}
        }
        lastHash = hash;
      }).catch(function() {});
  }, 1500);
})();

// ── 块编辑器（覆盖原有 openEditor / saveSlide） ────────────────────────────
var TYPE_LABEL = { st:'标题', sm:'正文', hl:'高亮', sl:'副标' };
var TYPE_ORDER = ['st', 'sl', 'sm', 'hl'];
var _edBlocks = [];

function htmlToBlocks(html) {
  var blocks = [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  function walk(node) {
    if (node.nodeType === 3) {
      var t = node.textContent.trim();
      if (t) blocks.push({ type: 'sm', text: t });
      return;
    }
    if (node.nodeType !== 1) return;
    var cls = (node.className || '').split(' ');
    var tag = node.tagName.toLowerCase();
    var text = (node.innerText || node.textContent || '').replace(/\n/g, ' ').trim();
    if (!text) { node.childNodes.forEach(walk); return; }
    if (cls.indexOf('st') >= 0 || cls.indexOf('cvt') >= 0) {
      blocks.push({ type: 'st', text: text });
    } else if (cls.indexOf('hl') >= 0) {
      blocks.push({ type: 'hl', text: text });
    } else if (cls.indexOf('sl') >= 0) {
      blocks.push({ type: 'sl', text: text });
    } else if (cls.indexOf('sm') >= 0) {
      blocks.push({ type: 'sm', text: text });
    } else if (tag === 'li') {
      blocks.push({ type: 'hl', text: text });
    } else {
      node.childNodes.forEach(walk);
    }
  }
  tmp.childNodes.forEach(walk);
  return blocks;
}

function blocksToHtml(blocks) {
  var parts = [];
  var liItems = [];
  var hlCount = blocks.filter(function(b) { return b.type === 'hl'; }).length;
  blocks.forEach(function(b) {
    if (b.type === 'hl' && hlCount > 1) {
      liItems.push(b.text);
    } else {
      if (liItems.length) {
        parts.push('<ul class="bl">' + liItems.map(function(t) { return '<li>' + t + '</li>'; }).join('') + '</ul>');
        liItems = [];
      }
      if (b.type === 'st') parts.push('<div class="st">' + b.text + '</div>');
      else if (b.type === 'hl') parts.push('<span class="hl">' + b.text + '</span>');
      else if (b.type === 'sl') parts.push('<div class="sl">' + b.text + '</div>');
      else parts.push('<div class="sm">' + b.text + '</div>');
    }
  });
  if (liItems.length) {
    parts.push('<ul class="bl">' + liItems.map(function(t) { return '<li>' + t + '</li>'; }).join('') + '</ul>');
  }
  return '<div class="sb">' + parts.join('') + '</div>';
}

function renderBlocks(blocks) {
  var container = document.getElementById('ed-blocks');
  if (!container) return;
  container.innerHTML = '';
  blocks.forEach(function(b, i) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';

    var sel = document.createElement('select');
    sel.style.cssText = 'border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:13px;min-width:68px;';
    TYPE_ORDER.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t; opt.textContent = TYPE_LABEL[t];
      if (t === b.type) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = function() { blocks[i].type = sel.value; };

    var inp = document.createElement('input');
    inp.type = 'text'; inp.value = b.text;
    inp.style.cssText = 'flex:1;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:15px;font-family:inherit;';
    inp.oninput = function() { blocks[i].text = inp.value; };

    var del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = 'border:none;background:none;font-size:20px;color:#ccc;cursor:pointer;line-height:1;padding:0 4px;';
    del.onclick = function() { blocks.splice(i, 1); renderBlocks(blocks); };

    var up = document.createElement('button');
    up.textContent = '↑';
    up.style.cssText = 'border:none;background:none;font-size:16px;color:#bbb;cursor:pointer;padding:0 2px;' + (i === 0 ? 'opacity:0.2;pointer-events:none;' : '');
    up.onclick = function() { var t = blocks[i-1]; blocks[i-1] = blocks[i]; blocks[i] = t; renderBlocks(blocks); };

    var dn = document.createElement('button');
    dn.textContent = '↓';
    dn.style.cssText = 'border:none;background:none;font-size:16px;color:#bbb;cursor:pointer;padding:0 2px;' + (i === blocks.length-1 ? 'opacity:0.2;pointer-events:none;' : '');
    dn.onclick = function() { var t = blocks[i+1]; blocks[i+1] = blocks[i]; blocks[i] = t; renderBlocks(blocks); };

    row.appendChild(up); row.appendChild(dn); row.appendChild(sel); row.appendChild(inp); row.appendChild(del);
    container.appendChild(row);
  });
}

// 替换编辑器 HTML（在 #editor-box 内）
(function() {
  var box = document.getElementById('editor-box');
  if (!box) return;
  var h3 = box.querySelector('h3');
  box.innerHTML = '';
  if (h3) box.appendChild(h3);

  // PPT内容区
  var label1 = document.createElement('label');
  label1.textContent = 'PPT 内容';
  label1.style.cssText = 'font-size:12px;color:#999;font-weight:500;letter-spacing:.04em;text-transform:uppercase;';
  var blocksDiv = document.createElement('div');
  blocksDiv.id = 'ed-blocks';
  var addBtn = document.createElement('button');
  addBtn.textContent = '+ 添加内容块';
  addBtn.style.cssText = 'margin-top:8px;padding:6px 16px;border:1px dashed #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#999;';
  addBtn.onclick = function() { _edBlocks.push({ type:'sm', text:'' }); renderBlocks(_edBlocks); };

  // 演讲稿区
  var label2 = document.createElement('label');
  label2.textContent = '演讲稿';
  label2.style.cssText = 'font-size:12px;color:#999;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-top:12px;display:block;';
  var ta = document.createElement('textarea');
  ta.id = 'ed-s'; ta.rows = 5;
  ta.style.cssText = 'width:100%;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:15px;font-family:inherit;line-height:1.7;resize:vertical;outline:none;';

  // 按钮区
  var btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;margin-top:12px;align-items:center;';
  var status = document.createElement('span');
  status.id = 'ed-status'; status.textContent = '✓ 已保存';
  status.style.cssText = 'font-size:13px;color:#60a060;display:none;';
  var btnCancel = document.createElement('button');
  btnCancel.textContent = '取消';
  btnCancel.style.cssText = 'padding:10px 24px;border-radius:6px;font-size:15px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:#fff;color:#666;';
  btnCancel.onclick = function() { closeEditor(); };
  var btnSave = document.createElement('button');
  btnSave.textContent = '保存';
  btnSave.style.cssText = 'padding:10px 24px;border-radius:6px;font-size:15px;cursor:pointer;font-family:inherit;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;';
  btnSave.onclick = function() { saveSlide(); };

  btns.appendChild(status); btns.appendChild(btnCancel); btns.appendChild(btnSave);
  box.appendChild(label1); box.appendChild(blocksDiv); box.appendChild(addBtn);
  box.appendChild(label2); box.appendChild(ta);
  box.appendChild(btns);
})();

// 覆盖 openEditor
window.openEditor = function() {
  window._editing = true;
  var numEl = document.getElementById('ed-num');
  if (numEl) numEl.textContent = cur + 1;
  var ta = document.getElementById('ed-s');
  if (ta) ta.value = D[cur].s || '';
  var st = document.getElementById('ed-status');
  if (st) st.style.display = 'none';
  _edBlocks = htmlToBlocks(D[cur].h || '');
  renderBlocks(_edBlocks);
  var overlay = document.getElementById('editor-overlay');
  if (overlay) overlay.classList.add('show');
};

// 覆盖 saveSlide
window.saveSlide = function() {
  D[cur].h = blocksToHtml(_edBlocks);
  var ta = document.getElementById('ed-s');
  if (ta) D[cur].s = ta.value;
  render(false);
  if (typeof ch !== 'undefined') ch.postMessage({ cur: cur, slides: D });
  fetch('/save', {
    method: 'POST',
    body: JSON.stringify(D),
    headers: { 'Content-Type': 'application/json' }
  }).then(function() {
    var st = document.getElementById('ed-status');
    if (st) { st.style.display = 'inline'; setTimeout(function() { st.style.display = 'none'; }, 2000); }
  }).catch(function() {});
};
</script>

<script>
// ── 图片选择器 ──────────────────────────────────────────────────────────────
(function() {
  // 创建图片选择器弹窗
  var picker = document.createElement('div');
  picker.id = 'img-picker';
  picker.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;';
  picker.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:28px;width:70vw;max-width:800px;max-height:80vh;display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h3 style="font-size:18px;font-weight:600;">选择图片 <span style="font-size:13px;color:#999;font-weight:400;">（images/ 目录）</span></h3>
        <button onclick="document.getElementById('img-picker').style.display='none';window._editing=false;" style="border:none;background:none;font-size:22px;color:#ccc;cursor:pointer;">×</button>
      </div>
      <div style="font-size:13px;color:#aaa;">把图片放到 images/ 目录后重新打开选择器</div>
      <div id="img-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;overflow-y:auto;max-height:55vh;padding:4px;"></div>
    </div>`;
  document.body.appendChild(picker);

  window.openImagePicker = function(callback) {
    window._editing = true;
    var grid = document.getElementById('img-grid');
    grid.innerHTML = '<div style="color:#aaa;font-size:14px;padding:20px;">加载中...</div>';
    picker.style.display = 'flex';

    fetch('/images?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(files) {
        if (!files.length) {
          grid.innerHTML = '<div style="color:#aaa;font-size:14px;padding:20px;">images/ 目录为空，请先放入图片</div>';
          return;
        }
        grid.innerHTML = '';
        files.forEach(function(f) {
          var card = document.createElement('div');
          card.style.cssText = 'cursor:pointer;border:2px solid #eee;border-radius:8px;overflow:hidden;transition:border-color .15s;';
          card.onmouseenter = function() { card.style.borderColor = '#1a1a1a'; };
          card.onmouseleave = function() { card.style.borderColor = '#eee'; };
          card.innerHTML = '<img src="' + f.url + '?t=' + Date.now() + '" style="width:100%;height:120px;object-fit:cover;display:block;">'
            + '<div style="padding:6px 8px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + f.name + '</div>';
          card.onclick = function() {
            picker.style.display = 'none';
            window._editing = false;
            if (callback) callback(f.url, f.name);
          };
          grid.appendChild(card);
        });
      }).catch(function() {
        grid.innerHTML = '<div style="color:#e00;font-size:14px;padding:20px;">加载失败，请确认 server.js 正在运行</div>';
      });
  };
})();

// 在编辑器的"添加内容块"旁边加"插入图片"按钮
(function waitForEditor() {
  var addBtn = document.getElementById('ed-add');
  if (!addBtn) { setTimeout(waitForEditor, 300); return; }

  // 避免重复注入
  if (document.getElementById('ed-add-img')) return;

  var imgBtn = document.createElement('button');
  imgBtn.id = 'ed-add-img';
  imgBtn.textContent = '🖼 插入图片';
  imgBtn.style.cssText = 'margin-top:8px;margin-left:8px;padding:6px 16px;border:1px dashed #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#888;';
  imgBtn.onclick = function() {
    openImagePicker(function(url, name) {
      _edBlocks.push({ type: 'img', text: url, name: name });
      renderBlocks(_edBlocks);
    });
  };
  addBtn.parentNode.insertBefore(imgBtn, addBtn.nextSibling);
})();

// 扩展 renderBlocks 支持 img 类型
var _origRenderBlocks = window.renderBlocks;
window.renderBlocks = function(blocks) {
  _origRenderBlocks(blocks);
  // 找所有 img 块，替换渲染
  var container = document.getElementById('ed-blocks');
  if (!container) return;
  var rows = container.children;
  blocks.forEach(function(b, i) {
    if (b.type !== 'img') return;
    var row = rows[i];
    if (!row) return;
    row.innerHTML = '';
    row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#fafafa;border-radius:8px;padding:8px 12px;';

    var preview = document.createElement('img');
    preview.src = b.text + '?t=' + Date.now();
    preview.style.cssText = 'height:60px;border-radius:4px;object-fit:cover;';

    var info = document.createElement('span');
    info.textContent = b.name || b.text;
    info.style.cssText = 'flex:1;font-size:14px;color:#666;';

    var change = document.createElement('button');
    change.textContent = '换图';
    change.style.cssText = 'border:1px solid #ddd;background:#fff;border-radius:6px;padding:4px 12px;font-size:13px;cursor:pointer;';
    change.onclick = function() {
      openImagePicker(function(url, name) {
        blocks[i].text = url; blocks[i].name = name;
        renderBlocks(blocks);
      });
    };

    var del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = 'border:none;background:none;font-size:20px;color:#ccc;cursor:pointer;';
    del.onclick = function() { blocks.splice(i, 1); renderBlocks(blocks); };

    row.appendChild(preview); row.appendChild(info); row.appendChild(change); row.appendChild(del);
  });
};

// 扩展 blocksToHtml 支持 img 类型
var _origBlocksToHtml = window.blocksToHtml;
window.blocksToHtml = function(blocks) {
  // 处理 img 块
  var hasImg = blocks.some(function(b) { return b.type === 'img'; });
  if (!hasImg) return _origBlocksToHtml(blocks);

  var parts = [];
  blocks.forEach(function(b) {
    if (b.type === 'img') {
      parts.push('<div class="sb-img"><img src="' + b.text + '" style="max-width:100%;max-height:60vh;object-fit:contain;border-radius:8px;" alt="' + (b.name||'') + '"></div>');
    } else if (b.type === 'st') {
      parts.push('<div class="st">' + b.text + '</div>');
    } else if (b.type === 'hl') {
      parts.push('<span class="hl">' + b.text + '</span>');
    } else if (b.type === 'sl') {
      parts.push('<div class="sl">' + b.text + '</div>');
    } else {
      parts.push('<div class="sm">' + b.text + '</div>');
    }
  });
  return '<div class="sb">' + parts.join('') + '</div>';
};

// 扩展 htmlToBlocks 支持 img 标签
var _origHtmlToBlocks = window.htmlToBlocks;
window.htmlToBlocks = function(html) {
  if (!html.includes('<img')) return _origHtmlToBlocks(html);
  var blocks = _origHtmlToBlocks(html);
  // 提取 img 标签
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var imgs = tmp.querySelectorAll('img');
  imgs.forEach(function(img) {
    var src = img.getAttribute('src') || '';
    var alt = img.getAttribute('alt') || src.split('/').pop();
    // 检查是否已在blocks里（htmlToBlocks可能把alt当文本加进去了）
    var exists = blocks.some(function(b) { return b.type === 'img' && b.text === src; });
    if (!exists && src) blocks.push({ type: 'img', text: src, name: alt });
  });
  return blocks;
};
</script>
