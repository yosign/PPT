// 编辑弹窗样式
var _style = document.createElement('style');
_style.textContent = `
#editor-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:center; justify-content:center; }
#editor-overlay.show { display:flex; }
#editor-box { background:#fff; border-radius:12px; padding:32px; width:80vw; max-width:900px; box-shadow:0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:16px; }
#editor-box h3 { font-size:20px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
#editor-box label { font-size:13px; color:#888; font-weight:500; letter-spacing:.04em; text-transform:uppercase; }
#editor-box textarea { width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:14px; font-size:15px; font-family:-apple-system,'PingFang SC',sans-serif; line-height:1.7; resize:vertical; outline:none; color:#1a1a1a; }
#editor-box textarea:focus { border-color:#1a1a1a; }
#editor-box .btns { display:flex; gap:10px; justify-content:flex-end; }
#editor-box button { padding:10px 24px; border-radius:6px; font-size:15px; cursor:pointer; font-family:inherit; border:1px solid #e0e0e0; }
#editor-box .btn-save { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
#editor-box .btn-cancel { background:#fff; color:#666; }
#editor-box .save-status { font-size:13px; color:#60a060; display:none; }
`;
document.head.appendChild(_style);

// 编辑弹窗 HTML
var _el = document.createElement('div');
_el.id = 'editor-overlay';
_el.innerHTML = `
<div id="editor-box">
  <h3 id="ed-title">编辑第 <span id="ed-num">1</span> 页</h3>
  <div>
    <label>PPT 内容（HTML）</label>
    <textarea id="ed-h" rows="8"></textarea>
  </div>
  <div>
    <label>演讲稿</label>
    <textarea id="ed-s" rows="6"></textarea>
  </div>
  <div class="btns">
    <span class="save-status" id="ed-status">✓ 已保存</span>
    <button class="btn-cancel" onclick="closeEditor()">取消</button>
    <button class="btn-save" onclick="saveSlide()">保存</button>
  </div>
</div>`;
document.body.appendChild(_el);

function openEditor() {
  document.getElementById('ed-num').textContent = cur + 1;
  document.getElementById('ed-h').value = D[cur].h;
  document.getElementById('ed-s').value = D[cur].s;
  document.getElementById('ed-status').style.display = 'none';
  document.getElementById('editor-overlay').classList.add('show');
}
function closeEditor() {
  document.getElementById('editor-overlay').classList.remove('show');
}
function saveSlide() {
  D[cur].h = document.getElementById('ed-h').value;
  D[cur].s = document.getElementById('ed-s').value;
  render();
  // 广播给演讲稿窗口
  ch.postMessage({cur: cur, slides: D});
  // 保存到 slides.json（需要 server.js 运行）
  fetch('/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(D)
  }).then(r => r.json()).then(r => {
    var st = document.getElementById('ed-status');
    st.style.display = 'inline';
    st.textContent = r.ok ? '✓ 已保存到 slides.json' : '⚠ 保存失败（需要 node server.js）';
  }).catch(() => {
    var st = document.getElementById('ed-status');
    st.style.display = 'inline';
    st.textContent = '⚠ 需要运行 node server.js 才能持久化保存';
  });
}

// 中键点击打开编辑
document.addEventListener('mousedown', function(e) {
  if (e.button === 1) { e.preventDefault(); openEditor(); }
});
document.addEventListener('auxclick', function(e) {
  if (e.button === 1) { e.preventDefault(); openEditor(); }
});

var D=[{"h": "<div class=\"sb\" style=\"justify-content:flex-end;padding-bottom:32px;gap:28px;\"><div class=\"cvt\">如果OpenClaw是<br>AI时代的iPhone 1</div><div class=\"cvs\">两个月真实体验<br>改变了什么，改变不了什么<br>以及这个阶段藏着什么机会</div></div>", "s": "2007年iPhone刚出来，没有应用商店，连文字都选不了、复制不了。知道它的人很少，真正火起来是iPhone 4那时候的事。\n\n但它做了一件事——它重新定义了手机的形态，从一个打电话发短信的设备，变成了个人娱乐和工作的终端。\n\n今天苹果的应用商店，全球一年带动的交易额接近1.3万亿美元，应用商店所在的服务业务占苹果整体收入的26%。这个生态，是从那个连复制粘贴都没有的iPhone 1开始的。\n\n我觉得现在的OpenClaw，有点像那时候的iPhone 1。方向已经定了，生态还没起来，但你能感觉到这个东西不一样。\n\n我用了两个月，今天跟大家说三件事：它改变了什么，改变不了什么，以及现在这个阶段藏着什么机会。"}, {"h": "<div class=\"sh\"><div class=\"sl\">定义</div><div class=\"st\">OpenClaw是什么</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"fl\"><span class=\"fs\">飞书</span><span class=\"fa\">·</span><span class=\"fs\">Telegram</span><span class=\"fa\">·</span><span class=\"fs\">WhatsApp</span><span class=\"fa\">·</span><span class=\"fs\">iMessage</span></div><div class=\"bq\">把AI放进你日常用的消息入口<br>接上各种能力</div><div class=\"sm dk\">你说一句话，它就能把事干了</div></div>", "s": "先说一下这个工具是什么。\n\nOpenClaw做的事情，是把AI放进你每天已经在用的即时通讯软件里——飞书、Telegram、WhatsApp、iMessage，你平时在哪发消息，它就在哪。\n\n然后把你的邮箱、日历、浏览器、文件全部接上。\n\n这样你有事找AI，不用专门打开一个应用，直接去找那个AI聊天，它就把事情干了。"}, {"h": "<div class=\"sh\"><div class=\"sl\">第一代</div><div class=\"st\">聊天窗口</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>打开网页，一问一答</li><li>把答案复制出来，关掉</li><li>每次都要重新描述背景</li></div></div>", "s": "要说清楚小龙虾改变了什么，得先说AI工具这两年怎么过来的。\n\n第一代是聊天窗口。大家把ChatGPT当百科全书用，打开网页，问问题，把答案复制出来，再关掉。每次用都要重新描述背景，用完跟它没关系。"}, {"h": "<div class=\"sh\"><div class=\"sl\">第二代</div><div class=\"st\">IDE / CLI</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>AI能干活了</li><li>但锁在开发工具里</li><li>得坐在电脑前，得懂编程</li><li>普通人感受不到</li></div></div>", "s": "第二代，AI开始能干活了，能写代码、能控制电脑。\n\n但这东西基本上锁在开发工具里。你得坐在电脑前，打开专门的软件，还得有一些编程经验，才能真正让它帮你做事。\n\n对大多数人来说，这道门还是没开。"}, {"h": "<div class=\"sh\"><div class=\"sl\">第三代</div><div class=\"st\">OpenClaw</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>学习你的技能</li><li>在你的消息软件里等着</li><li>你说一句话，它去做，做完告诉你</li></div><div class=\"bq\">原来AI应该是这个样子的</div></div>", "s": "第三代是小龙虾。它学习了你的那些技能，你发一条消息，它去做，做完告诉你。不需要打开别的东西。\n\n我第一次体验到这件事的时候，感受不是\"这真厉害\"，而是\"原来AI应该是这个样子的\"。\n\n就像第一次用智能手机的人，不会觉得\"这手机真厉害\"，而是觉得\"手机应该是这个样子的\"。\n\n这个感受我后来跟很多用过OpenClaw的人聊，大家都有。"}, {"h": "<div class=\"sh\"><div class=\"sl\">问题</div><div class=\"st\">第一代的问题</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>摩擦太大</li><li>需要的时候打开一个软件</li><li>问完问题，复制出来，关掉</li></div><div class=\"bq\">外挂的形式<br>两边始终没连上</div></div>", "s": "第一代有一个根本问题，不是模型不够聪明，是摩擦太大。\n\n你需要的时候，专门打开一个软件，重新描述背景，等回答，把有用的复制出来，再回到工作状态。\n\n它是外挂的形式——你的工作流在这边，AI在另一个App里，用完关掉，两边始终没连上。"}, {"h": "<div class=\"sh\"><div class=\"sl\">问题</div><div class=\"st\">第二代的问题</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>AI能干活了</li><li>但你得坐在电脑前</li><li>得有编程经验</li><li>才能让它为你所用</li></div></div>", "s": "第二代往前走了一步，AI能干活了，能写代码、能控制电脑。\n\n但本质上还是一样——你得坐在电脑前，打开专门的软件，而且得有一些编程经验，才能真正让AI帮你做事。\n\n对大多数人来说，这道门还是没开。"}, {"h": "<div class=\"sh\"><div class=\"sl\">突破</div><div class=\"st\">门槛降低了</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>把复杂工具包装成一个机器人</li><li>不需要学软件</li><li>不需要懂编程</li><li>只需要跟它对话</li></div><div class=\"bq\">就像有了自己的贾维斯</div></div>", "s": "相比前两代，OpenClaw在使用门槛上降低了很多。\n\n它可以把一个很复杂的工具，完全包装成一个机器人。你不需要学怎么用那个工具，不需要懂编程，就是跟一个机器人对话，把你要做的事说清楚，它去搞定。\n\n当然要说清楚——部署门槛还是挺高的，装起来需要折腾一番。但装好之后，使用门槛是真的低，普通人也能用起来。\n\n这就是所谓的贾维斯——钢铁侠不需要自己动手操作每一个系统，他只是说话，贾维斯去执行。OpenClaw想做的就是这件事。"}, {"h": "<div class=\"sh\"><div class=\"sl\">真实体验</div><div class=\"st\">我的两个账号</div></div><div class=\"sb\"><div class=\"tc\"><div class=\"cb\"><div class=\"cl\">账号 A</div><div class=\"ct\">AI资讯</div><div class=\"ci\">图文内容</div></div><div class=\"cb\"><div class=\"cl dk\">账号 B</div><div class=\"ct\">疗愈音频</div><div class=\"ci\">脑波音乐</div></div></div><div class=\"sm\">创作需要时间，但碎片时间完全可以用上</div></div>", "s": "接下来说说我自己的真实体验。\n\n我在运营两个内容账号，一个做AI资讯和独立开发，一个做疗愈音频，冥想和脑波音乐。\n\n两个方向完全不同，但有一个共同问题：创作需要时间，而我们每天要花很多时间在创作上。\n\n但实际上不需要花那么多时间，碎片时间完全可以用上。于是我用小龙虾把这两个账号的工作方式都重构了。"}, {"h": "<div class=\"sh\"><div class=\"sl\">图文创作</div><div class=\"st\">工作流重构</div></div><div class=\"sb\"><div class=\"tc\"><div class=\"cb\"><div class=\"cl\">以前</div><div class=\"ci\">有想法 → 等整块时间 → 写<br><br>想法容易过时<br>今天有明天不写就浪费了</div></div><div class=\"cb\"><div class=\"cl dk\">现在</div><div class=\"ci\">读完文章 = 文章写完了<br><br>阅读就是写作<br>最核心的环节</div></div></div></div>", "s": "先说图文账号。\n\n以前写文章需要整块时间，但更大的问题不是时间不够，是想法容易过时。今天有个想法，第二天没空写，第三天不写，这个想法就浪费了。\n\n现在的流程彻底变了：我读完一篇文章，文章基本上就写完了。\n\n具体来说，小龙虾推荐内容，我选择读哪篇，分段读完之后写读书笔记。阅读的时候产生的想法最有价值，这一步是整个流程最核心的环节。AI根据笔记帮我选选题、完善结构，最后结合笔记和原文直接输出文章。\n\n几乎把整个写作流程重新梳理了一遍，节省的不只是时间，是那些本来会浪费掉的想法。"}, {"h": "<div class=\"sh\"><div class=\"sl\">疗愈音频</div><div class=\"st\">从主观到客观</div></div><div class=\"sb\"><div class=\"tc\"><div class=\"cb\"><div class=\"cl\">以前</div><div class=\"ci\">凭感觉选内容<br><br>我喜欢的<br>≠ 受众需要的</div></div><div class=\"cb\"><div class=\"cl dk\">现在</div><div class=\"ci\">AI筛高播放量音频<br>→ 裁剪 → 配视频<br>→ 加说明 → 我拍板</div></div></div></div>", "s": "再说疗愈音频账号。\n\n以前选内容靠感觉，选自己喜欢的颜色、视频、音频。但有一个隐蔽的问题：我的喜好不等于受众的需求。我觉得好看，不代表看冥想内容的人需要这个。\n\n现在是AI去找高播放量的脑波音频，按质量筛选，裁剪成30分钟，配上疗愈视频，加文字说明，组成几个方案给我选。\n\nAI的筛选逻辑是完全客观的，高播放量是受众用行为投票出来的答案，不掺杂我的主观偏好。我从\"凭感觉做内容\"变成了\"在客观筛选的基础上做最终判断\"。"}, {"h": "<div class=\"sh\"><div class=\"sl\">全流程</div><div class=\"st\">图文工作流</div></div><div class=\"sb\"><div class=\"ni\"><div class=\"nn\">01</div><div><div class=\"nt\">找选题</div><div class=\"nd\">Twitter · 论文 · 最新发布</div></div></div><div class=\"ni\"><div class=\"nn\">02</div><div><div class=\"nt\">我选几篇阅读，写读书笔记</div></div></div><div class=\"ni\"><div class=\"nn\">03</div><div><div class=\"nt\">AI整合笔记，逐段写3000字文章</div></div></div><div class=\"ni\"><div class=\"nn\">04</div><div><div class=\"nt\">转图片 → 自动发布</div></div></div></div>", "s": "我把整个工作流告诉了小龙虾。\n\n它每天去Twitter、论文库、最新发布里找选题，推给我一批内容，我从里面选几篇读。读完写笔记，发给它，它把原文和笔记整合在一起，然后逐章逐段帮我写文章，大概3000字。\n\n写文章的时候，它知道我的账号定位是什么，面向的读者是谁，什么样的写法数据会好。这个不是固定的，是会迭代的。\n\n写完之后，文字转图片，通过浏览器模拟点击，自动传到平台，贴上标题，点发布。全程我不需要动手。"}, {"h": "<div class=\"sh\"><div class=\"sl\">闭环</div><div class=\"st\">数据迭代</div></div><div class=\"sb\" style=\"gap:24px;\"><div class=\"fl\"><span class=\"fs\">点击率</span><span class=\"fa\">·</span><span class=\"fs\">点赞率</span><span class=\"fa\">·</span><span class=\"fs\">收藏率</span><span class=\"fa\">·</span><span class=\"fs\">分享率</span></div><div class=\"ni\"><div class=\"nn\">↓</div><div><div class=\"nt\">提炼写作方法</div></div></div><div class=\"ni\"><div class=\"nn\">↓</div><div><div class=\"nt\">更新写作建议</div></div></div><div class=\"ni\"><div class=\"nn\">↓</div><div><div class=\"nt\">下一篇文章自动变好</div></div></div></div>", "s": "每天早上9点，它去看前一天的数据——点击率、点赞率、收藏率、分享率。\n\n根据这些数据，它对自己写的文章做总结，提炼出哪些写法对我的读者有效，然后把这些方法更新到它的写作建议里。\n\n下一篇文章，它就用更新后的方法写。\n\n这样整个流程就形成了一个自动迭代的闭环，不需要我手动去复盘。"}, {"h": "<div class=\"sh\"><div class=\"sl\">痛点</div><div class=\"st\">记忆系统</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"sm\" style=\"color:#e07040;\">目前吐槽最多的部分</div><div class=\"bl\"><li>昨天说的事今天忘了</li><li>一直强调的事记不住</li><li>短期长期记忆混乱</li></div></div>", "s": "说一个大家用小龙虾吐槽最多的问题——记忆系统。\n\n它目前不够智能。昨天跟它说的事，今天可能就忘了。一直强调的事，它记不住。短期和长期记忆有点混乱。\n\n这不是小毛病，是真实影响体验的问题。"}, {"h": "<div class=\"sh\"><div class=\"sl\">解决方案</div><div class=\"st\">QMD</div></div><div class=\"sb\"><div class=\"tc\"><div class=\"cb\"><div class=\"cl\">短期记忆</div><div class=\"ci\">最近发生的事，清晰</div></div><div class=\"cb\"><div class=\"cl\">长期记忆</div><div class=\"ci\">定期压缩归纳</div></div></div><div class=\"bq\">按需提取<br>不用全塞进上下文</div><div class=\"sm dk\">效率更高 · 更省钱 · 记忆力更好</div></div>", "s": "我本来想接一个付费的记忆方案，后来发现有个开源的叫QMD，解决了同样的问题，就接上了。\n\n在折腾这个过程里，我大概搞清楚了AI的记忆是怎么工作的。其实跟人很像——短期记忆是一个文件，记着最近发生的事，很清楚。长期记忆会定期把近期内容压缩归纳，写进一个越来越大的长期记忆文件。\n\n问题是，如果把所有记忆都塞进模型的上下文，又慢又贵。QMD的做法是按需提取——需要什么记忆，临时去找，不用全部加载。\n\n这样就形成了一个既高效又省钱、记忆力还不错的系统。\n\n我觉得这是现在这个阶段折腾小龙虾最大的收获之一——你会真正搞清楚AI是怎么工作的。"}, {"h": "<div class=\"sh\"><div class=\"sl\">门槛</div><div class=\"st\">养虾的真正门槛</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">模型质量决定体验上限</div><div class=\"bl\"><li>国产模型体验落后半年</li><li>认真用，模型不要省</li></div></div>", "s": "用了两个月，想直接说清楚这个工具的边界。\n\n第一个门槛是模型。模型质量对养虾体验的影响比你想象的大，模型弱一档，整个体验就掉一个台阶。国产模型体验大概落后半年。如果打算认真用，模型不要省。"}, {"h": "<div class=\"sh\"><div class=\"sl\">案例</div><div class=\"st\">一个朋友的故事</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bl\"><li>折腾一礼拜装好了</li><li>继续当GPT用</li><li>没ChatGPT好用，放弃了</li></div><div class=\"bq\">问题不是工具<br>是没想清楚要用它做什么</div></div>", "s": "我一个朋友的经历更能说明问题。\n\n他从安装到配置折腾了一礼拜，装好了之后，继续当GPT用，发现没有ChatGPT好用，就放弃了。\n\n他的问题不是小龙虾不好，是他从来没想清楚，装好之后要用它做什么具体的事。"}, {"h": "<div class=\"sh\"><div class=\"sl\">核心</div><div class=\"st lg\">真正的门槛</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">你有没有<br>真实的、可替代的<br>重复性的任务</div><div><span class=\"hl\">有，它能帮你。没有，装了也是摆设。</span></div></div>", "s": "这才是我觉得最核心的门槛。\n\n你有没有真实的、可替代的、重复性的任务。\n\n很多人说小龙虾能帮你赚钱，这话没错，但得说清楚。它不是你说\"帮我赚钱\"它就能做到，这种模糊的任务它做不了。\n\n那些用它赚到钱的人，是因为他们有一套相对固定的工作流，比如量化交易，比如内容发布，把这套流程交给小龙虾去执行，它能完整跑完。\n\n所以真正的问题不是小龙虾能不能帮你赚钱，而是你有没有一套具体的、可以描述清楚的流程，可以交给它去跑。有，它能帮你。没有，装了也是摆设。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会</div><div class=\"st\">生态位几乎都是空的</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"sm\">iPhone 1发布时<br>没人知道Uber和Instagram会出现</div><div class=\"bq\">那些公司都在那个时间窗口<br>找到了位置</div></div>", "s": "最后说说机会。\n\n现在是同样的时刻。\n\niPhone 1发布的时候，没人知道Uber会出现，没人知道Instagram会出现。但那些公司都在那个时间窗口里找到了自己的位置。\n\n现在OpenClaw的生态位几乎都是空的，我看到五类机会。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会 01</div><div class=\"st\">入口层</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">谁占住用户最高频的消息入口<br>谁就是AI时代的主屏</div><div class=\"tc\"><div class=\"cb\"><div class=\"cl\">过去</div><div class=\"ci\">手机桌面<br>App图标</div></div><div class=\"cb\"><div class=\"cl dk\">接下来</div><div class=\"ci\">聊天线程<br>语音唤起<br>通知流</div></div></div></div>", "s": "第一类机会是入口层。\n\n过去十年，占住用户手机主屏的App赢了。接下来，谁先占住用户最高频的消息入口，谁就更有可能成为AI时代的主屏。\n\n这个方向的机会不只是做一个agent，而是做AI的操作系统外壳——会话中控台、跨渠道身份层、记忆层、权限层。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会 02</div><div class=\"st\">技能生态</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">iPhone真正爆发靠的是应用商店<br>不是硬件，是生态</div><div class=\"bl\"><li>可发现、可安装、可收费的skills</li><li>谁先做出高质量技能</li><li>谁吃到最早一波生态红利</li></div></div>", "s": "第二类机会是技能生态。\n\niPhone真正爆发靠的不是硬件，是应用商店。小龙虾的长期价值也未必来自一个主agent，而可能来自可发现、可安装、可收费的skills生态。\n\n这也是为什么腾讯背着骂名也要把小程序商店搞起来的原因——这是一个很重要的生态位，谁占住谁就有持续的收益。\n\n不过我自己觉得，skill商店的生态最终长什么样，现在还不好说。这个方向是对的，但具体形态可能跟我们现在想的不一样，后续观察。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会 03</div><div class=\"st\">垂直场景产品化</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">用户不为「agent架构」买单<br>只为「帮我省30分钟」买单</div><div class=\"sm dk\">找到那个具体的烦恼，把它做透，就是一个产品</div></div>", "s": "第三类机会是垂直场景产品化。\n\n早期智能手机时代的赢家，往往不是先讲平台故事的人，而是先把一个场景做透的人。\n\n用户不会为\"agent架构\"买单，只会为\"帮我省下30分钟\"买单。找到那个具体的烦恼，把它做透，就是一个产品。对在座的创业者来说，这是最直接的切入点。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会 04</div><div class=\"st\">安全基础设施</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">AI Agent时代的<br>360安全助手</div><div class=\"bl\"><li>腾讯手机管家已经在做这个事了</li><li>最容易被低估</li><li>护城河最深</li></div></div>", "s": "第四类机会是安全基础设施。\n\n这是AI Agent时代的360安全助手。现在腾讯手机管家已经在做这个事了，它已经可以扫你电脑上装小龙虾时的安全问题。\n\n最容易被低估，但护城河最深。"}, {"h": "<div class=\"sh\"><div class=\"sl\">机会 05</div><div class=\"st\">个性化记忆飞轮</div></div><div class=\"sb\" style=\"gap:28px;\"><div class=\"bq\">用久了<br>AI比你自己更懂你自己</div><div class=\"bl\"><li>开源、闭源、收费、免费都有了</li><li>这套记忆就是护城河</li><li>你不会轻易换掉它</li></div></div>", "s": "第五类机会是个性化记忆飞轮。\n\n现在已经有很多外挂的记忆系统，开源的、闭源的、收费的、免费的都有了。如何管理你和AI交互的这套上下文，会成为未来一个很重要的壁垒。\n\n因为这个记忆系统里存的，是你的偏好、你的决策习惯、你的工作方式。用久了，AI比你自己更懂你自己。\n\n到那个时候，你不会轻易换掉它。这套记忆就是护城河。"}, {"h": "<div class=\"sb\" style=\"justify-content:center;align-items:flex-start;gap:36px;\"><div class=\"cvt\">谢谢大家</div><div class=\"cvs\">找到那个烦恼<br>比研究工具更重要<br><br>现在是2007年<br>位置还没人占</div></div>", "s": "小龙虾不是一个让你突然变得更厉害的工具。\n\n它更像一面镜子——你在配置它的时候，实际上是在梳理自己的工作方式。哪些值得自动化，哪些必须亲手做，哪些信息是真正有价值的。\n\n如果你是普通人，错过小龙虾，可能真的没什么影响。但如果你是从业者，错过iPhone 1，你可能会错过一年后的应用商店，错过整个时代最重要的占位机会。\n\n找到那个烦恼，比研究工具本身更重要。\n\n谢谢大家。"}];



var cur=0, tot=D.length;
var ch = new BroadcastChannel('ppt-sync');

function render(broadcast){
  document.getElementById('sc').innerHTML='<div class="sc">'+D[cur].h+'</div>';
  document.getElementById('pg').textContent=(cur+1)+' / '+tot;
  document.getElementById('pb').style.width=((cur+1)/tot*100)+'%';
  if(broadcast !== false) ch.postMessage({cur: cur});
}

function nav(d){
  var n=cur+d;
  if(n>=0&&n<tot){ cur=n; render(); }
}

ch.onmessage = function(e){
  if(typeof e.data.cur === 'number' && e.data.cur !== cur){
    cur = e.data.cur;
    if(e.data.slides) D = e.data.slides;
    render(false);
  }
};

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nav(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') nav(-1);
  if(e.key==='e'||e.key==='E') openEditor();
  if(e.key==='Escape') closeEditor();
});

render();
</script>
</body>
</html>
